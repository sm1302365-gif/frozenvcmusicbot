name: KwaiCut CI

on:
  push:
    paths:
      - "KwaiCut/**"
      - ".github/workflows/kwaicut.yml"
  pull_request:
    paths:
      - "KwaiCut/**"
      - ".github/workflows/kwaicut.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: KwaiCut
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install package (dev extra)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest
